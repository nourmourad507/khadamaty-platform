version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: khadamaty-db
    environment:
      POSTGRES_USER: khadamaty
      POSTGRES_PASSWORD: khadamaty123
      POSTGRES_DB: khadamaty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - khadamaty-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: khadamaty-redis
    ports:
      - "6379:6379"
    networks:
      - khadamaty-network

  # API Server
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: khadamaty-api
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://khadamaty:khadamaty123@postgres:5432/khadamaty_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-key
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - khadamaty-network

  # Web App
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: khadamaty-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - khadamaty-network

  # Admin Dashboard
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: khadamaty-admin
    ports:
      - "3002:3002"
    depends_on:
      - api
    networks:
      - khadamaty-network

volumes:
  postgres_data:

networks:
  khadamaty-network:
    driver: bridge
